version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bank_postgres
    environment:
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_password
      POSTGRES_DB: bank_db
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_user -d bank_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: bank_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka1:
    image: confluentinc/cp-kafka:7.4.4
    container_name: bank_kafka1
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Внутренний порт 9092 для общения контейнеров, внешний 29092 для доступа с хоста
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Настройки для exactly-once и транзакций
      # хранить журнал транзакций в 3х копияз
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      # требовать подтвреждения записи минимум от 2х брокеров
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      # инфо о том какие сообщения прочитаны
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      # подтверждение от 2 брокеров из 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

  kafka2:
    image: confluentinc/cp-kafka:7.4.4
    container_name: bank_kafka2
    depends_on:
      - zookeeper
    ports:
      - "39092:39092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092,PLAINTEXT_HOST://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

  kafka3:
    image: confluentinc/cp-kafka:7.4.4
    container_name: bank_kafka3
    depends_on:
      - zookeeper
    ports:
      - "49092:49092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092,PLAINTEXT_HOST://localhost:49092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3


  kafka-init:
    image: confluentinc/cp-kafka:7.4.4
    container_name: bank_kafka_init
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    command: >
      bash -c "
            while ! kafka-topics --bootstrap-server kafka1:9092 --list; do echo 'Waiting for Kafka...'; sleep 5; done;
            kafka-topics --create --topic transfers-topic --if-not-exists --bootstrap-server kafka1:9092 --partitions 3 --replication-factor 3 --config retention.ms=300000
            "

  # Продюсер
  app-producer:
    build: .
    container_name: bank_producer
    environment:
      - SPRING_PROFILES_ACTIVE=producer
      # Переопределяем localhost на внутренние имена контейнеров!
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bank_db
      - KAFKA_BROKERS=kafka1:9092,kafka2:9092,kafka3:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # Консюмер (3 копии)
  app-consumer:
    build: .
    deploy:
      replicas: 3 #3 независимых контейнера!
    environment:
      - SPRING_PROFILES_ACTIVE=consumer
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bank_db
      - KAFKA_BROKERS=kafka1:9092,kafka2:9092,kafka3:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
volumes:
  postgres_data:
